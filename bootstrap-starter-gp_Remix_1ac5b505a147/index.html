<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strona</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Nagłówek H2</h2>
  <p class = "h2">Nagłówek H2</p>
    <div class="row">
        <!-- Nieuporządkowana lista -->
        <div class="col-md-4">
            <div class="p-3 mb-3 bg-primary text-white rounded">
                <h4>Nieuporządkowana lista</h4>
                <ul>
                    <li>Element 1</li>
                    <li>Element 2</li>
                    <li>Element 3</li>
                    <li>Element 4</li>
                </ul>
            </div>
        </div>

        <!-- Uporządkowana lista -->
        <div class="col-md-4">
            <div class="p-3 mb-3 bg-success text-white rounded">
                <h4>Uporządkowana lista</h4>
                <ol>
                    <li>Element 1</li>
                    <li>Element 2</li>
                    <li>Element 3</li>
                    <li>Element 4</li>
                </ol>
            </div>
        </div>

        <!-- Lista bez stylów -->
        <div class="col-md-4">
            <div class="p-3 mb-3 bg-danger text-white rounded">
                <h4>Lista bez stylów</h4>
                <ul class="list-unstyled">
                    <li>Element 1</li>
                    <li>Element 2</li>
                    <li>Element 3</li>
                    <li>Element 4</li>
                </ul>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
